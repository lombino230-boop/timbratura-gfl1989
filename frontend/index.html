<!DOCTYPE html>
<html lang="it">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Time GFL - Accedi</title>
  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="manifest" href="manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
</head>

<body class="flex items-center justify-center min-h-screen p-4">
  <div class="container animate-slide-up">
    <div class="glass p-8 rounded-3xl">
      <div class="text-center mb-8">
        <div class="logo-container">
          <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4" />
            <polyline points="10 17 15 12 10 7" />
            <line x1="15" y1="12" x2="3" y2="12" />
          </svg>
        </div>
        <h1 style="font-size: 1.5rem; font-weight: 800; color: #0f172a;">Bentornato</h1>
        <p style="color: #64748b; font-size: 0.875rem;">Accedi per timbrare la giornata</p>
      </div>

      <div id="error-box"
        style="display: none; background: #fef2f2; color: #b91c1c; padding: 1rem; border-radius: 1rem; margin-bottom: 1.5rem; font-size: 0.875rem; border: 1px solid #fee2e2;">
      </div>

      <form id="login-form">
        <div class="form-group">
          <label>Email Aziendale</label>
          <input type="email" id="email" required placeholder="mario.rossi@azienda.it">
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="password" required placeholder="••••••••">
        </div>
        <button type="submit" id="submit-btn" class="btn btn-primary">
          <span>Accedi</span>
        </button>
      </form>
    </div>
  </div>

  <script src="assets/js/api.js"></script>
  <script>
    if (auth.isAuthenticated()) window.location.href = 'dashboard.html';

    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const btn = document.getElementById('submit-btn');
      const errorBox = document.getElementById('error-box');

      btn.disabled = true;
      btn.innerHTML = 'Verifica in corso...';
      errorBox.style.display = 'none';

      try {
        const data = await api.post('/auth/login', { email, password });
        localStorage.setItem('token', data.token);
        localStorage.setItem('user', JSON.stringify(data.user));
        window.location.href = 'dashboard.html';
      } catch (error) {
        errorBox.innerText = error.message;
        errorBox.style.display = 'block';
        btn.disabled = false;
        btn.innerHTML = 'Accedi';
      }
    });
  </script>
</body>

</html>

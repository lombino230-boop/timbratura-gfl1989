<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Time GFL - Amministrazione</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            background: #f1f5f9;
        }

        .sidebar {
            width: 280px;
            height: 100vh;
            position: fixed;
            left: 0;
            top: 0;
            background: #0f172a;
            color: white;
            padding: 2rem;
        }

        .main-admin {
            margin-left: 280px;
            padding: 3rem;
        }

        .nav-link {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.875rem 1rem;
            color: #94a3b8;
            text-decoration: none;
            border-radius: 0.75rem;
            margin-bottom: 0.5rem;
            transition: all 0.2s;
        }

        .nav-link.active {
            background: var(--primary);
            color: white;
        }

        .nav-link:hover:not(.active) {
            background: #1e293b;
            color: white;
        }

        .stats-grid {
            display: grid;
            grid-template-cols: repeat(auto-fit, minmax(240px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2.5rem;
        }

        .stat-card {
            background: white;
            padding: 1.5rem;
            border-radius: 1.25rem;
            border: 1px solid #e2e8f0;
        }

        .table-container {
            background: white;
            border-radius: 1.5rem;
            border: 1px solid #e2e8f0;
            overflow: hidden;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        th {
            background: #f8fafc;
            padding: 1rem 1.5rem;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            color: #64748b;
            border-bottom: 1px solid #e2e8f0;
        }

        td {
            padding: 1rem 1.5rem;
            border-bottom: 1px solid #f1f5f9;
            font-size: 0.875rem;
        }
    </style>
</head>

<body>
    <aside class="sidebar">
        <div
            style="font-weight:900; font-size:1.25rem; margin-bottom:3rem; display:flex; align-items:center; gap:0.5rem;">
            <div
                style="width:32px; height:32px; background:var(--primary); border-radius:8px; display:flex; align-items:center; justify-content:center; color:white; font-size:0.75rem;">
                TG</div>
            TimeGFL Admin
        </div>
        <nav>
            <a href="#" class="nav-link active">Dashboard</a>
            <a href="#" class="nav-link">Dipendenti</a>
            <a href="#" class="nav-link">Sedi</a>
            <a href="#" class="nav-link">Report</a>
        </nav>
        <div style="position:absolute; bottom:2rem; left:2rem; width:calc(100% - 4rem);">
            <button onclick="auth.logout()"
                style="width:100%; text-align:left; background:none; border:none; color:#64748b; cursor:pointer;"
                class="nav-link">Esci</button>
        </div>
    </aside>

    <main class="main-admin">
        <div style="display:flex; justify-content:space-between; align-items:flex-end; margin-bottom:3rem;">
            <div>
                <h1 style="font-size:2rem; font-weight:900;">Dashboard Amministrativa</h1>
                <p style="color:#64748b;">Monitoraggio presenze in tempo reale</p>
            </div>
            <button class="btn btn-primary"
                style="width:auto; height:44px; padding:0 1.25rem; font-size:0.875rem;">Esporta Report</button>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <p style="color:#64748b; font-size:0.875rem; margin-bottom:0.5rem;">Presenti Oggi</p>
                <h2 style="font-size:1.75rem; font-weight:900;">12 dipendenti</h2>
            </div>
            <div class="stat-card">
                <p style="color:#64748b; font-size:0.875rem; margin-bottom:0.5rem;">Sedi Attive</p>
                <h2 style="font-size:1.75rem; font-weight:900;">5 sedi</h2>
            </div>
            <div class="stat-card">
                <p style="color:#64748b; font-size:0.875rem; margin-bottom:0.5rem;">Anomalie GPS</p>
                <h2 style="font-size:1.75rem; font-weight:900; color:var(--danger);">0 (OK)</h2>
            </div>
        </div>

        <div class="table-container">
            <div
                style="padding:1.5rem; border-bottom:1px solid #e2e8f0; display:flex; justify-content:space-between; align-items:center;">
                <h3 style="font-weight:800;">Ultime Timbrature</h3>
                <input type="text" placeholder="Cerca..." style="width:240px; font-size:0.75rem; padding:0.5rem 1rem;">
            </div>
            <table>
                <thead>
                    <tr>
                        <th>Dipendente</th>
                        <th>Tipo</th>
                        <th>Orario</th>
                        <th>Sede</th>
                        <th>Stato GPS</th>
                        <th>Azione</th>
                    </tr>
                </thead>
                <tbody id="admin-records">
                    <!-- Dynamic records here -->
                </tbody>
            </table>
        </div>
    </main>

    <script src="assets/js/api.js"></script>
    <script>
        const user = auth.getUser();
        if (!auth.isAuthenticated() || user.role !== 'admin') window.location.href = 'index.html';

        async function loadAdminData() {
            try {
                const sessions = await api.get('/history'); // Mocking with history for simplicity
                const container = document.getElementById('admin-records');
                container.innerHTML = sessions.map(s => `
                    <tr>
                        <td style="font-weight:700;">User #${s.user_id}</td>
                        <td>${s.status === 'active' ? '<b style="color:var(--success)">INGRESSO</b>' : '<b style="color:var(--text-muted)">USCITA</b>'}</td>
                        <td>${new Date(s.in_time).toLocaleString('it-IT')}</td>
                        <td>Sede Centrale</td>
                        <td style="color:var(--success); font-weight:700;">OK (12m)</td>
                        <td><button style="border:none; background:none; color:var(--primary); cursor:pointer; font-weight:700;">Dettagli</button></td>
                    </tr>
                `).join('') || '<tr><td colspan="6" style="text-align:center; padding:3rem; color:#94a3b8;">Nessuna registrazione</td></tr>';
            } catch (e) { console.error(e); }
        }

        loadAdminData();
    </script>
</body>

</html>

<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Time GFL - Dashboard</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
    <style>
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .avatar {
            width: 40px;
            height: 40px;
            background: #e2e8f0;
            border-radius: 0.75rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: #475569;
        }

        .main-card {
            text-align: center;
            padding: 2.5rem 1.5rem;
            position: relative;
            overflow: hidden;
            margin-bottom: 2rem;
            border-radius: 2rem;
        }

        .card-accent {
            position: absolute;
            top: 0;
            left: 0;
            width: 4px;
            height: 100%;
            background: var(--primary);
        }

        .date-display {
            font-size: 0.875rem;
            color: #64748b;
            margin-bottom: 0.5rem;
            font-weight: 500;
        }

        .status-text {
            font-size: 2rem;
            font-weight: 900;
            color: #0f172a;
            margin-bottom: 1.5rem;
        }

        .btn-action {
            height: 140px;
            border-radius: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .history-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.25rem;
            border-radius: 1.25rem;
            margin-bottom: 0.75rem;
            border: 1px solid #f1f5f9;
            background: white;
        }
    </style>
</head>

<body>
    <div class="container animate-slide-up">
        <div class="header">
            <div class="user-info">
                <div class="avatar" id="user-avatar">?</div>
                <div>
                    <h2 style="font-size: 1rem; font-weight: 700;" id="user-name">Caricamento...</h2>
                    <p style="font-size: 0.75rem; text-transform: uppercase; color: #64748b; letter-spacing: 0.05em;"
                        id="user-role">...</p>
                </div>
            </div>
            <button onclick="auth.logout()"
                style="background: none; border: none; cursor: pointer; color: #94a3b8;"><svg
                    xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
                    <polyline points="16 17 21 12 16 7" />
                    <line x1="21" y1="12" x2="9" y2="12" />
                </svg></button>
        </div>

        <div class="glass main-card">
            <div class="card-accent" id="status-accent"></div>
            <div class="date-display" id="current-date">Oggi, 4 Marzo</div>
            <div class="status-text" id="status-info">Fuori Servizio</div>

            <div id="action-container">
                <button id="clock-btn" class="btn btn-primary btn-action" onclick="handleClock()">
                    <svg id="icon-in" style="display:block" xmlns="http://www.w3.org/2000/svg" width="32" height="32"
                        viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round">
                        <path d="M12 2v20" />
                        <path d="m17 17-5 5-5-5" />
                        <path d="m17 7-5-5-5 5" />
                    </svg>
                    <svg id="icon-out" style="display:none" xmlns="http://www.w3.org/2000/svg" width="32" height="32"
                        viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round">
                        <circle cx="12" cy="12" r="10" />
                        <polyline points="12 6 12 12 16 14" />
                    </svg>
                    <span id="btn-text">Caricamento...</span>
                </button>
            </div>

            <p style="margin-top: 1.5rem; font-size: 0.75rem; color: #94a3b8; font-style: italic;">
                Posizione GPS acquisita solo alla timbratura
            </p>
        </div>

        <h3 style="padding: 0 0.5rem 1rem; font-size: 1.125rem; font-weight: 800;">Cronologia Recente</h3>
        <div id="history-list">
            <!-- Items injected here -->
        </div>
    </div>

    <script src="assets/js/api.js"></script>
    <script>
        if (!auth.isAuthenticated()) window.location.href = 'index.html';

        const user = auth.getUser();
        document.getElementById('user-name').innerText = user.name;
        document.getElementById('user-role').innerText = user.role;
        document.getElementById('user-avatar').innerText = user.name.charAt(0);
        document.getElementById('current-date').innerText = new Intl.DateTimeFormat('it-IT', { weekday: 'long', day: 'numeric', month: 'long' }).format(new Date());

        let activeSession = null;

        async function loadUI() {
            try {
                const sessions = await api.get('/history');
                activeSession = sessions.find(s => s.status === 'active');
                updateStatusUI();
                renderHistory(sessions);
            } catch (e) { console.error(e); }
        }

        function updateStatusUI() {
            const btn = document.getElementById('clock-btn');
            const txt = document.getElementById('btn-text');
            const info = document.getElementById('status-info');
            const accent = document.getElementById('status-accent');
            const iconIn = document.getElementById('icon-in');
            const iconOut = document.getElementById('icon-out');

            if (activeSession) {
                btn.className = "btn btn-danger btn-action";
                txt.innerText = "TIMBRA USCITA";
                info.innerText = "In Servizio";
                accent.style.background = "#ef4444";
                iconIn.style.display = 'none';
                iconOut.style.display = 'block';
            } else {
                btn.className = "btn btn-primary btn-action";
                txt.innerText = "TIMBRA ENTRATA";
                info.innerText = "Fuori Servizio";
                accent.style.background = "#0284c7";
                iconIn.style.display = 'block';
                iconOut.style.display = 'none';
            }
        }

        function renderHistory(sessions) {
            const list = document.getElementById('history-list');
            list.innerHTML = sessions.length ? '' : '<div style="text-align:center; padding: 2rem; color: #94a3b8;">Nessuna attività</div>';

            sessions.slice(0, 5).forEach(s => {
                const date = new Date(s.in_time);
                const timeStr = date.toLocaleTimeString('it-IT', { hour: '2-digit', minute: '2-digit' });
                const outTime = s.out_time ? '| ' + new Date(s.out_time).toLocaleTimeString('it-IT', { hour: '2-digit', minute: '2-digit' }) : '';

                const item = document.createElement('div');
                item.className = 'history-item';
                item.innerHTML = `
                    <div style="display:flex; align-items:center; gap:0.75rem;">
                        <div style="width:40px; height:40px; background:#f1f5f9; border-radius:0.75rem; display:flex; align-items:center; justify-content:center; color:#64748b">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
                        </div>
                        <div>
                            <div style="font-weight:700">${timeStr} ${outTime}</div>
                            <div style="font-size:0.75rem; color:#94a3b8">${date.toLocaleDateString('it-IT')}</div>
                        </div>
                    </div>
                    <div style="color: #10b981; font-weight:700; font-size:0.75rem; display:flex; align-items:center; gap:0.25rem;">
                        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M20 6 9 17l-5-5"/></svg> GPS
                    </div>
                `;
                list.appendChild(item);
            });
        }

        async function handleClock() {
            const btn = document.getElementById('clock-btn');
            const originalContent = btn.innerHTML;
            btn.disabled = true;
            btn.innerHTML = 'Recupero posizione...';

            try {
                const pos = await new Promise((resolve, reject) => {
                    navigator.geolocation.getCurrentPosition(resolve, reject, { enableHighAccuracy: true });
                });

                const endpoint = activeSession ? '/clock-out' : '/clock-in';
                await api.post(endpoint, {
                    lat: pos.coords.latitude,
                    lon: pos.coords.longitude
                });

                loadUI();
            } catch (e) {
                alert(e.message || 'Errore geolocalizzazione');
            } finally {
                btn.disabled = false;
                btn.innerHTML = originalContent;
            }
        }

        loadUI();
    </script>
</body>

</html>
